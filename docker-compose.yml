version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: library_postgres
    environment:
      POSTGRES_USER: libraryuser
      POSTGRES_PASSWORD: librarypass
      POSTGRES_DB: library_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U libraryuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: library_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - library_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: library_backend
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: 1
      DATABASE_URL: postgresql://libraryuser:librarypass@postgres:5432/library_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-secret-key-change-in-prod
      FLASK_APP: app.py
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - library_network
    command: python -m flask run --host=0.0.0.0

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: library_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - library_network
    environment:
      REACT_APP_API_URL: http://localhost:5000/api

  # Agents Service
  agents:
    build:
      context: .
      dockerfile: docker/Dockerfile.agents
    container_name: library_agents
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://libraryuser:librarypass@postgres:5432/library_db
      REDIS_URL: redis://redis:6379/0
      GITHUB_TOKEN: ${GITHUB_TOKEN:-your-token-here}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-your-secret-here}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents
      - ./backend:/app/backend
    networks:
      - library_network

volumes:
  postgres_data:

networks:
  library_network:
    driver: bridge
